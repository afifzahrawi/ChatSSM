services:
  - type: web
    name: chatssm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run chatssm_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
    disk:
      name: chatssm-data
      mountPath: /app/qa_data
      sizeGB: 1